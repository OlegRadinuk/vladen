server {
    listen 80;
    server_name vladen-crimea.ru www.vladen-crimea.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vladen-crimea.ru www.vladen-crimea.ru;

    ssl_certificate     /etc/letsencrypt/live/vladen-crimea.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vladen-crimea.ru/privkey.pem;

    # Статика Next.js — кэш 1 год
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Медиафайлы из public/
    location /cases/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Всё остальное
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Стриминг чата (SSE)
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
